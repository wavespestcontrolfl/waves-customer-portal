[build]
builder = "nixpacks"

[build.nixpacks]
buildCmd = "npm run build"

[deploy]
# Migrations run as the release command — once per deploy, before the
# new instance(s) take traffic. Fail-fast: if migrate:latest exits
# non-zero, Railway rejects the deploy and the previous version stays
# live (correct failure mode for schema changes). See issue #286 for
# the rationale (was: in-process per-boot retry loop in server/index.js
# that swallowed three error patterns and could mask real drift).
releaseCommand = "npm run db:migrate"
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
