<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0ea5e9" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Waves" />
    <link rel="apple-touch-icon" href="/waves-logo.png" />
    <meta name="description" content="Waves Lawn & Pest Customer Portal — View services, manage billing, and track your lawn care." />
    <title>Waves Lawn & Pest — Customer Portal</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=Montserrat:wght@500;600;700;800;900&family=Nunito+Sans:wght@400;600;700;800&family=Poppins:wght@500;600;700&family=Luckiest+Guy&family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; color: #0F172A; }
      h1, h2 { font-family: 'Anton', 'Luckiest Guy', cursive; letter-spacing: 0.02em; }
      h3, h4 { font-family: 'Montserrat', 'Inter', sans-serif; }
      h5, h6 { font-family: 'Inter', system-ui, sans-serif; }
      /* Admin shell stays monochrome + DM Sans — never inherit the customer-facing brand display fonts. */
      .admin-shell-v2 h1, .admin-shell-v2 h2,
      .admin-main h1, .admin-main h2,
      .admin-sidebar h1, .admin-sidebar h2 {
        font-family: 'DM Sans', sans-serif;
        letter-spacing: normal;
      }
      input::placeholder, textarea::placeholder { color: #64748B; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
